<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧸 QiQi專屬推廣卷轉換器 🍀</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #fefaf0; /* 溫柔奶黃色背景 */
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
            box-sizing: border-box; 
        }
        .container { 
            background: #ffffff; 
            padding: 30px; 
            border-radius: 24px; 
            box-shadow: 0 8px 24px rgba(222, 184, 135, 0.2); 
            width: 100%; 
            max-width: 450px; 
            text-align: center;
            border: 2px solid #fce8b2; 
        }
        h2 { 
            color: #b27a30; /* 溫暖焦糖棕 */
            margin: 0 0 8px 0; 
            font-size: 22px; 
            font-weight: bold; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .subtitle { 
            color: #8c7662; 
            font-size: 14px; 
            margin-bottom: 25px; 
            line-height: 1.5; 
        }
        .input-group {
            text-align: left;
            margin-bottom: 18px;
        }
        label {
            font-size: 14px;
            color: #7a582c;
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
        }
        textarea { 
            width: 100%; 
            height: 140px;
            padding: 15px; 
            box-sizing: border-box; 
            border: 2px solid #fce8b2; 
            border-radius: 16px; 
            font-size: 15px; 
            line-height: 1.5; 
            outline: none; 
            transition: all 0.2s; 
            background-color: #fffdf9; 
            resize: none;
        }
        textarea:focus { 
            border-color: #ffd166; 
            background-color: #fff; 
            box-shadow: 0 0 8px rgba(255, 209, 102, 0.4);
        }
        .info-row { 
            display: flex; 
            justify-content: space-between; 
            font-size: 13px; 
            color: #60803c; /* 幸運草綠 */
            margin-top: 6px; 
            padding: 0 4px; 
            font-weight: 500; 
        }
        .btn-group { 
            display: flex; 
            gap: 12px; 
            margin-top: 22px; 
        }
        .btn-main { 
            background-color: #ffd166; 
            color: #6b4d24; 
            border: none; 
            padding: 14px; 
            flex: 2; 
            border-radius: 14px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold; 
            transition: all 0.2s; 
            box-shadow: 0 4px 10px rgba(255, 209, 102, 0.3); 
        }
        .btn-main:hover { 
            background-color: #ffca47; 
        }
        .btn-clear { 
            background-color: #f5eedc; 
            color: #8c7662; 
            border: none; 
            padding: 14px; 
            flex: 1; 
            border-radius: 14px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold; 
            transition: background 0.2s; 
        }
        .btn-clear:hover { 
            background-color: #ebdcb9; 
        }
        .result-box { 
            display: none; 
            margin-top: 22px; 
            padding: 18px; 
            background-color: #f7f9f2; 
            border: 2px dashed #c2d6a4; 
            border-radius: 16px; 
            text-align: left; 
        }
        .result-title { 
            color: #4a662f; 
            font-weight: bold; 
            margin-bottom: 14px; 
            font-size: 15px; 
            display: flex; 
            align-items: center; 
            gap: 5px; 
        }
        .link-list { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }
        .item-btn { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background-color: #fff3d1; 
            color: #7a582c; 
            text-decoration: none; 
            padding: 14px 18px; 
            border-radius: 12px; 
            font-weight: bold; 
            font-size: 15px; 
            transition: transform 0.1s, background 0.2s; 
            border: 1px solid #fce8b2;
            box-shadow: 0 2px 6px rgba(255, 243, 209, 0.5); 
        }
        .item-btn:hover { 
            background-color: #ffeaa7; 
        }
        .item-btn:active { 
            transform: scale(0.98); 
        }
        .item-btn .go-text { 
            font-size: 13px; 
            color: #b27a30; 
            font-weight: bold; 
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🧸 QiQi專屬推廣卷轉換器 🍀</h2>
    <div class="subtitle">點連結後自動出現券，一人五張</div>
    
    <div class="input-group">
        <label for="inputLink">請貼上蝦皮商品網址（即使包含中文字也沒關係）🛒</label>
        <textarea id="inputLink" placeholder="請在此貼上普通的蝦皮商品網址...例如：https://s.shopee.tw/xxxxxx" oninput="updateCount()"></textarea>
        <div class="info-row">
            <span id="detectText" style="color: #8c7662;">偵測到 0 個商品網址</span>
            <span style="color: #a6927e;">一次最多 5 個 🐾</span>
        </div>
    </div>

    <div class="btn-group">
        <button class="btn-main" onclick="convertLinks()">🍀 產生轉換連結 🧸</button>
        <button class="btn-clear" onclick="clearAll()">清除</button>
    </div>

    <div class="result-box" id="resultBox">
        <div class="result-title" id="resultTitle">🍀 成功產生 0 個購買連結</div>
        <div class="link-list" id="linkList"></div>
    </div>
</div>

<script>
    // 🔒 莉祺專屬：將妳最新的九折券推廣金鑰長期鎖定在前端，確保收益100%歸妳！
    const MY_CAMPAIGN_CODE = '9zvAlgVHk5'; 

    function getUrls() {
        const text = document.getElementById('inputLink').value;
        // 精準抓取各式蝦皮網址，同時排除中文字元與特殊圖標
        const regex = /(https?:\/\/(?:[a-zA-Z0-9-]+\.)?(?:shopee\.tw|shp\.ee)\/[^\s\u4e00-\u9fa5🛒→]+)/g;
        return text.match(regex) || [];
    }

    function updateCount() {
        const urls = getUrls();
        const detectText = document.getElementById('detectText');
        if (urls.length > 0) {
            detectText.innerText = `偵測到 ${urls.length} 個商品網址 🍀`;
            detectText.style.color = '#60803c';
        } else {
            detectText.innerText = `偵測到 0 個商品網址`;
            detectText.style.color = '#8c7662';
        }
    }

    function convertLinks() {
        const urls = getUrls();
        const resultBox = document.getElementById('resultBox');
        const linkList = document.getElementById('linkList');
        const resultTitle = document.getElementById('resultTitle');

        if (urls.length === 0) {
            alert('請先貼上有效的蝦皮商品網址喔！🛒');
            return;
        }

        linkList.innerHTML = '';
        const maxLinks = Math.min(urls.length, 5);
        
        for (let i = 0; i < maxLinks; i++) {
            let originalUrl = urls[i];
            
            // 🔥 超強防錯機制：先拔掉網址後面所有帶問號 ? 的垃圾追蹤參數（解決 mobile 參數導致斷線的問題）
            let cleanUrl = originalUrl.split('?')[0];
            
            // 如果網址最後面有殘留的斜線，先把它去掉
            if (cleanUrl.endsWith('/')) {
                cleanUrl = cleanUrl.slice(0, -1);
            }

            // 提取最純淨的商品代碼（例如從 https://s.shopee.tw/qgvnRrwSf 提取出 qgvnRrwSf）
            let urlParts = cleanUrl.split('/');
            let itemCode = urlParts[urlParts.length - 1];

            // 🛠️ 完美走官方原生的雙重路由解析格式，徹底拋棄並繞過壞掉的 Worker：
            // 格式：https://s.shopee.tw/妳的券代碼/商品代碼
            let finalLink = `https://s.shopee.tw/${MY_CAMPAIGN_CODE}/${itemCode}`;

            // 產生精美的小熊按鈕
            const a = document.createElement('a');
            a.href = finalLink;
            a.className = 'item-btn';
            a.target = '_blank';
            a.innerHTML = `<span>🧸 商品連結 ${i + 1} 🍀</span> <span class="go-text">前往購買 →</span>`;
            linkList.appendChild(a);
        }

        resultTitle.innerText = `✨ 成功產生 ${maxLinks} 個官方安全分潤連結 ✨`;
        resultBox.style.display = 'block';
    }

    function clearAll() {
        document.getElementById('inputLink').value = '';
        document.getElementById('resultBox').style.display = 'none';
        document.getElementById('linkList').innerHTML = '';
        updateCount();
    }
</script>

</body>
</html>
